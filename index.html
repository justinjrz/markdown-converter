                    <textarea id="markdownInput"># Markdown 转换器使用指南

欢迎使用 Markdown 转换器！这是一个功能强大的工具，可以将 Markdown 文档转换为 PDF 和长图片。

## 功能特性

### 文本格式

支持 **粗体文本**、*斜体文本*、~~删除线~~ 和 `行内代码`。

### 标题层级

# 一级标题
## 二级标题
### 三级标题
#### 四级标题

### 列表

**无序列表：**
- 项目一
- 项目二
  - 子项目 2.1
  - 子项目 2.2
- 项目三

**有序列表：**
1. 第一项
2. 第二项
3. 第三项

### 引用

> 这是一段引用文字
> 
> 可以包含多行内容
> 
> 非常适合引用他人的话语或重要说明

### 代码块

支持多种编程语言的语法高亮：

```javascript
function greet(name) {
    console.log(`Hello, ${name}!`);
    return `Welcome to Markdown Converter!`;
}

greet('World');
```

```python
def fibonacci(n):
    """计算斐波那契数列"""
    if n <= 1:
        return n
    return fibonacci(n-1) + fibonacci(n-2)

# 输出前10个斐波那契数
for i in range(10):
    print(f"F({i}) = {fibonacci(i)}")
```

### 数学公式

**行内公式：** 爱因斯坦的质能方程 $E = mc^2$ 是物理学的基础。

**块级公式：**

$$
\int_{-\infty}^{\infty} e^{-x^2} dx = \sqrt{\pi}
$$

二次方程的求根公式：

$$
x = \frac{-b \pm \sqrt{b^2 - 4ac}}{2a}
$$

矩阵示例：

$$
\begin{pmatrix}
a & b \\
c & d
\end{pmatrix}
\begin{pmatrix}
x \\
y
\end{pmatrix}
=
\begin{pmatrix}
ax + by \\
cx + dy
\end{pmatrix}
$$

| 代码高亮 | ✅ | 支持多种编程语言 |

### 链接和图片

[访问 GitHub](https://github.com) 了解更多信息。

## 使用技巧

1. **快捷键：**
   - `Ctrl + S` 保存内容到本地
   - `Ctrl + P` 导出 PDF
   - `Ctrl + I` 导出图片

2. **文件上传：**
   - 点击"上传文件"按钮选择文件
   - 或直接拖拽 `.md` 文件到编辑器区域

3. **主题切换：**
   - 点击预览区的主题切换按钮
   - 在深色和浅色主题间切换

4. **导出选项：**
   - PDF：适合打印和正式文档
   - 图片：可选择 1x、2x、3x 质量
   - 图片质量越高，文件越大，但更清晰
